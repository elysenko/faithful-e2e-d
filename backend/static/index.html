<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaithfulD Book Notes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container" data-testid="app-ready">
    <header>
      <h1>FaithfulD Book Notes</h1>
      <p class="subtitle">Capture short notes about the books you read.</p>
    </header>

    <form id="note-form" class="note-form" autocomplete="off">
      <label for="title">Book title</label>
      <input id="title" name="title" type="text" maxlength="200"
             placeholder="e.g. The Pragmatic Programmer" required />

      <label for="body">Note</label>
      <textarea id="body" name="body" rows="3" maxlength="1000"
                placeholder="A short thought about this book…" required></textarea>

      <button id="add-note" type="submit">Add note</button>
      <p id="form-error" class="error" role="alert" hidden></p>
    </form>

    <section>
      <h2>Your notes</h2>
      <ul id="notes" class="notes" aria-live="polite"></ul>
      <p id="empty-state" class="empty" hidden>No notes yet — add your first one above.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
